# Override any default configurations for the expected environment and RL training algorithm here
#e.g.
#  env:
#   action_scale: 1.0
#
#  Will rewrite the default experiment name to "test" from the provided config passed to run.py 
# 
# See doc/templates

reward_config:
    scales: 
      # Tracking related rewards.
      tracking_lin_vel: 1.0
      tracking_ang_vel: 0.75
      # Base related rewards.
      lin_vel_z: 0.0
      ang_vel_xy: -0.15
      orientation: -1.0
      base_height: 0.0
      # Energy related rewards.
      torques: 0.0
      action_rate: 0.0
      energy: 0.0
      # Feet related rewards.
      feet_clearance: 0.0
      feet_air_time: 2.0
      feet_slip: -0.25
      feet_height: 0.0
      feet_phase: 1.0
      # Other rewards.
      stand_still: -1.0
      alive: 0.0
      is_healthy: 0.0
      termination: -100.0
      # Pose related rewards.
      joint_deviation_knee: -0.1
      joint_deviation_hip: -0.25
      dof_pos_limits: -1.0
      pose: -0.1
    
    tracking_sigma: 0.25 # Standard deviation for tracking velocity rewards
    max_foot_height: 0.15
    base_height_target: 0.9 
  

